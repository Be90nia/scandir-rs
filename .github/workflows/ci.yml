name: CI

permissions: { }

on:
  push:
    branches:
      - master
    tags:
      - "*.*.*"
    paths-ignore:
      - "README.md"
  pull_request:
    paths-ignore:
      - "README.md"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  cargo-fmt:
    name: "cargo fmt"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Rust toolchain"
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # zizmor: ignore[unpinned-uses]
        with:
          toolchain: nightly
          components: rustfmt

      - name: "Setup Rust cache"
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          lookup-only: true

      - name: "cargo fmt"
        run: cargo fmt --all --check

  cargo-clippy:
    name: "cargo clippy"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Rust Toolchain"
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # zizmor: ignore[unpinned-uses]
        with:
          toolchain: nightly
          components: clippy

      - name: "Setup Rust cache"
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          lookup-only: true

      - name: "Use git jwalk-meta dependency on CI"
        shell: bash
        run: python3 .github/scripts/strip_local_patch.py

      - name: "Cargo clippy"
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::style -D clippy::perf

  tests:
    name: "tests (python ${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
          - "pypy3.11"
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]

      - name: Install Rust toolchain (nightly)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: rustfmt, clippy

      - name: "Create and activate .venv"
        shell: bash
        run: |
          uv venv .venv --python ${{ matrix.python-version }}
          echo ".venv/bin" >> "$GITHUB_PATH"
          echo "PYO3_PYTHON=.venv/bin/python3" >> "$GITHUB_ENV"

      - name: "Install dependencies"
        run: |
          cd pyscandir
          uv pip install --group dev

      - name: "Run zizmor"
        run: |
          zizmor .github/

      - name: "Run rumdl"
        run: |
          rumdl check .

      - name: "Run Ruff"
        run: |
          ruff check

      - name: "Use git jwalk-meta dependency on CI"
        shell: bash
        run: python3 .github/scripts/strip_local_patch.py

      - name: "Run maturin (--release)"
        run: |
          cd pyscandir
          rustc --version --verbose
          uvx maturin==1.13.3 build --release --interpreter=python --out target/wheels
          uv pip install target/wheels/*.whl

      - name: "Run pytest"
        run: |
          cd pyscandir
          uv run pytest tests/

  linux:
    name: "linux (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})"
    needs: [ tests, cargo-fmt, cargo-clippy ]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - {
            runner: ubuntu-latest,
            target: x86_64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11",
            maturin-args: "--release --out dist"
          }
          - {
            runner: ubuntu-latest,
            target: x86,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11",
            maturin-args: "--release --out dist"
          }
          - {
            runner: ubuntu-latest,
            target: aarch64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11",
            maturin-args: "--release --out dist --zig"
          }
          - {
            runner: ubuntu-latest,
            target: armv7,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11",
            maturin-args: "--release --out dist"
          }
          - {
            runner: ubuntu-latest,
            target: s390x,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11",
            maturin-args: "--release --out dist"
          }
          - {
            runner: ubuntu-latest,
            target: ppc64le,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11",
            maturin-args: "--release --out dist"
          }
    steps:

      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: rustc, cargo, rustfmt

      - name: Enable sccache properly for nightly
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_IDLE_TIMEOUT=0" >> $GITHUB_ENV

      - name: "Use git jwalk-meta dependency on CI"
        shell: bash
        run: python3 .github/scripts/strip_local_patch.py

      - name: "Build wheels"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          rust-toolchain: nightly
          target: ${{ matrix.platform.target }}
          args: ${{ matrix.platform.maturin-args }} --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          manylinux: auto
          working-directory: pyscandir

      - name: "Upload wheels"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: wheels-linux-${{ matrix.platform.target }}
          path: pyscandir/dist/*.whl

  linux-sse:
    name: "linux-sse (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})"
    needs: [ tests, cargo-fmt, cargo-clippy ]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - {
            runner: ubuntu-latest,
            target: x86_64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11",
            maturin-args: "--release --out dist"
          }
          - {
            runner: ubuntu-latest,
            target: x86,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11",
            maturin-args: "--release --out dist"
          }
    steps:

      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: rustc, cargo, rustfmt

      - name: Enable sccache properly for nightly
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_IDLE_TIMEOUT=0" >> $GITHUB_ENV

      - name: "Use git jwalk-meta dependency on CI"
        shell: bash
        run: python3 .github/scripts/strip_local_patch.py

      - name: "Build wheels for older CPUs (SSE)"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v2 -Zshare-generics=n"
        with:
          rust-toolchain: nightly
          target: ${{ matrix.platform.target }}
          args: ${{ matrix.platform.maturin-args }} --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          manylinux: auto
          working-directory: pyscandir

      - name: Add postfix to wheel name
        run: |
          for wheel in pyscandir/dist/*.whl; do
            sudo mv "$wheel" "${wheel%.whl}-sse.whl"
          done

      - name: "Upload wheels"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: wheels-linux-${{ matrix.platform.target }}-sse
          path: pyscandir/dist/*.whl

  musllinux:
    name: "musllinux (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})"
    needs: [ tests, cargo-fmt, cargo-clippy ]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - {
            runner: ubuntu-latest,
            target: x86_64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11"
          }
          - {
            runner: ubuntu-latest,
            target: x86,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11"
          }
          - {
            runner: ubuntu-latest,
            target: aarch64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11"
          }
          - {
            runner: ubuntu-latest,
            target: armv7,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11"
          }

    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: rustc, cargo, rustfmt

      - name: Enable sccache properly for nightly
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_IDLE_TIMEOUT=0" >> $GITHUB_ENV

      - name: "Use git jwalk-meta dependency on CI"
        shell: bash
        run: python3 .github/scripts/strip_local_patch.py

      - name: "Build wheels"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          rust-toolchain: nightly
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          manylinux: musllinux_1_2
          working-directory: pyscandir

      - name: "Upload wheels"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: wheels-musllinux-${{ matrix.platform.target }}
          path: pyscandir/dist/*.whl

  windows:
    name: "windows (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})"
    needs: [ tests, cargo-fmt, cargo-clippy ]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - {
            runner: windows-latest,
            target: x64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11",
            maturin-args: "--release --out dist"
          }
          - {
            runner: windows-latest,
            target: x86,
            interpreter: "3.10 3.11 3.12 3.13 3.14",
            maturin-args: "--release --out dist"
          }
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: rustc, cargo, rustfmt

      - name: Enable sccache properly for nightly
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_IDLE_TIMEOUT=0" >> $GITHUB_ENV

      - name: "Use git jwalk-meta dependency on CI"
        shell: bash
        run: python3 .github/scripts/strip_local_patch.py

      - name: "Build wheels"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          rust-toolchain: nightly
          target: ${{ matrix.platform.target }}
          args: ${{ matrix.platform.maturin-args }} --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          working-directory: pyscandir

      - name: "Upload wheels"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: wheels-windows-${{ matrix.platform.target }}
          path: pyscandir/dist/*.whl


  windows-sse:
    name: "windows-sse (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})"
    needs: [ tests, cargo-fmt, cargo-clippy ]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - {
            runner: windows-latest,
            target: x64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11",
            maturin-args: "--release --out dist"
          }
          - {
            runner: windows-latest,
            target: x86,
            interpreter: "3.10 3.11 3.12 3.13 3.14",
            maturin-args: "--release --out dist"
          }
    steps:

      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x
          architecture: ${{ matrix.platform.target }}

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: rustc, cargo, rustfmt

      - name: Enable sccache properly for nightly
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_IDLE_TIMEOUT=0" >> $GITHUB_ENV

      - name: "Use git jwalk-meta dependency on CI"
        shell: bash
        run: python3 .github/scripts/strip_local_patch.py

      - name: "Build wheels for older CPUs (SSE)"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        env:
          RUSTFLAGS: "-C target-cpu=x86-64-v2 -Zshare-generics=n"
        with:
          rust-toolchain: nightly
          target: ${{ matrix.platform.target }}
          args: ${{ matrix.platform.maturin-args }} --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          working-directory: pyscandir

      - name: Add postfix to wheel name
        shell: bash
        run: |
          for wheel in pyscandir/dist/*.whl; do
            mv "$wheel" "${wheel%.whl}-sse.whl"
          done

      - name: "Upload wheels"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: wheels-linux-${{ matrix.platform.target }}-sse
          path: pyscandir/dist/*.whl

  macos:
    name: "macos (${{ matrix.platform.runner }} / ${{ matrix.platform.target }})"
    needs: [ tests, cargo-fmt, cargo-clippy ]
    runs-on: ${{ matrix.platform.runner }}
    strategy:
      matrix:
        platform:
          - {
            runner: macos-latest,
            target: x86_64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11"
          }
          - {
            runner: macos-latest,
            target: aarch64,
            interpreter: "3.10 3.11 3.12 3.13 3.14 pypy3.11"
          }
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: "Setup Python"
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x

      - name: Install nightly Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
        with:
          toolchain: nightly
          components: rustc, cargo, rustfmt

      - name: Enable sccache properly for nightly
        if: "!startsWith(github.ref, 'refs/tags/')"
        run: |
          echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV
          echo "SCCACHE_IDLE_TIMEOUT=0" >> $GITHUB_ENV

      - name: "Use git jwalk-meta dependency on CI"
        shell: bash
        run: python3 .github/scripts/strip_local_patch.py

      - name: "Build wheels"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          rust-toolchain: nightly
          target: ${{ matrix.platform.target }}
          args: --release --out dist --interpreter ${{ matrix.platform.interpreter }}
          sccache: ${{ !startsWith(github.ref, 'refs/tags/') }} # zizmor: ignore[cache-poisoning]
          working-directory: pyscandir

      - name: "Upload wheels"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: wheels-macos-${{ matrix.platform.target }}
          path: pyscandir/dist/*.whl

  build-sdist:
    name: "build sdist"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Temporary modify workspace Cargo.toml
        run: |
          sed -i '/members = \["scandir", "pyscandir"\]/c\members = ["scandir"]\nexclude = ["pyscandir"]' Cargo.toml
          cat Cargo.toml

      - name: "Use git jwalk-meta dependency on CI"
        shell: bash
        run: python3 .github/scripts/strip_local_patch.py

      - name: "Build sdist"
        uses: PyO3/maturin-action@e83996d129638aa358a18fbd1dfb82f0b0fb5d3b # v1.51.0
        with:
          command: sdist
          args: --out dist
          rust-toolchain: nightly
          working-directory: pyscandir

      - name: "Upload sdist"
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: wheels-sdist
          path: pyscandir/dist/*.tar.gz

  release:
    name: "Release"
    runs-on: ubuntu-latest
    if: ${{ startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch' }}
    needs: [ linux, musllinux, windows, macos, build-sdist, tests, cargo-clippy, cargo-fmt, linux-sse, windows-sse ]
    permissions:
      # Use to sign the release artifacts
      id-token: write
      # Used to upload release artifacts
      contents: write
      # Used to generate artifact attestation
      attestations: write
    steps:
      - name: "Download all artifacts"
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          path: artifacts
          pattern: wheels-*
          merge-multiple: true   # flattens everything into one dir

      - name: Show what we got
        run: ls -R artifacts

      - name: "Generate artifact attestation"
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-path: "artifacts/*"

      - name: Create/Release GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        # zizmor: ignore[superfluous-actions]
        with:
          files: |
            artifacts/*
          draft: false
          prerelease: false
          generate_release_notes: true
          fail_on_unmatched_files: true
